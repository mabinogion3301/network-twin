version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: network-twin-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: network_twin
    ports:
      - "5432:5432"
    volumes:
      - network_twin_pgdata:/var/lib/postgresql/data

volumes:
  network_twin_pgdata:
